# Container image
caddy_image: "public.ecr.aws/docker/library/caddy:latest"

# Caddy listen port (unprivileged, mapped via firewall from 80)
caddy_listen_port: 9080

# Caddy HTTPS listen port (unprivileged, mapped via firewall from 443)
caddy_listen_port_https: 9443

# Host path where Caddy's internal root CA certificate is exported after
# startup. Containers on the same host can mount this file and set
# SSL_CERT_FILE so they trust Caddy's self-signed TLS. Only exported when
# caddy_domain is set (i.e. Caddy is issuing internal certs).
caddy_ca_cert_host_path: "/etc/pki/caddy-internal/root.crt"

# Domain name for the server. Used for subdomain-based reverse proxy
# routing and self-signed TLS certificates. If empty, Caddy only
# serves the dashboard on :80 (no reverse proxy, no HTTPS).
caddy_domain: ""

# Reverse proxy service definitions. Each entry creates a subdomain
# route: <subdomain>.<caddy_domain> → localhost:<port>.
# Only used when caddy_domain is set.
#
# Example:
#   caddy_reverse_proxy_services:
#     - { subdomain: pihole, port: 8443, proto: https }
#     - { subdomain: syncthing, port: 8384, proto: https }
#     - { subdomain: jukebox, port: 9100 }
#     - { subdomain: photos, port: 3000 }
#     - { subdomain: paperless, port: 8000 }
caddy_reverse_proxy_services: []

# Seed Caddy's internal ACME CA (root + intermediate cert/key under
# caddy/pki/authorities/local/) from files staged by the role.
#
# Set to true in host_vars when the four files are present under
#   roles/caddy/files/volumes/caddy-data/caddy/pki/authorities/local/
#     root.crt
#     root.key          (ansible-vault encrypted recommended)
#     intermediate.crt
#     intermediate.key  (ansible-vault encrypted recommended)
# The project convention is to symlink these paths into the
# home-server-private overlay (see roles/caddy/README.md for bootstrap).
#
# When false (default), Caddy generates a fresh CA on first start. To
# preserve the CA across reinstalls, extract it once with
# scripts/caddy-ca-extract.sh, vault-encrypt the two .key files, commit
# them to the private overlay, and flip this flag to true.
caddy_seed_internal_ca: false
