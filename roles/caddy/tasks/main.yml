---

- name: Ensure rootless user group exists
  ansible.builtin.group:
    name: webproxy
    gid: "{{ my_linux_users.webproxy.gid }}"
    state: present

- name: Ensure rootless user exists
  ansible.builtin.user:
    name: webproxy
    state: present
    uid: "{{ my_linux_users.webproxy.uid }}"
    group: webproxy
    create_home: true

- name: Enable linger for rootless user
  become: true
  ansible.builtin.command:
    cmd: "loginctl enable-linger webproxy"
  changed_when: false

- name: Enable podman auto-update timer for rootless user # noqa: no-changed-when
  become: true
  ansible.builtin.command:
    cmd: >
      sudo -u webproxy XDG_RUNTIME_DIR=/run/user/{{ my_linux_users.webproxy.uid }}
      DBUS_SESSION_BUS_ADDRESS=unix:path=/run/user/{{ my_linux_users.webproxy.uid }}/bus
      systemctl --user enable --now podman-auto-update.timer
  changed_when: false

- name: Ensure dashboard output directory exists
  become: true
  ansible.builtin.file:
    path: /var/www/dashboard
    state: directory
    mode: "0755"
    setype: container_file_t

- name: Save current role path
  ansible.builtin.set_fact:
    caddy_role_path: "{{ role_path }}"

- name: Deploy caddy container using podman_quadlet
  ansible.builtin.include_role:
    name: luckynrslevin.podman_quadlet
  vars:
    podman_quadlet_app_name: caddy
    podman_quadlet_rootless_user_name: webproxy
    podman_quadlet_files_templates_src_path: "{{ caddy_role_path }}"
    podman_quadlet_file_names:
      - caddy.container.j2
      - caddy-data.volume
      - caddy-config.volume
      - caddy-etc.volume
    podman_quadlet_volumes_files_to_stage: >-
      {{
        [
          {
            'name': 'caddy-etc',
            'files': [{'src': 'Caddyfile.j2', 'mode': '0644'}]
          }
        ]
        + (
          [
            {
              'name': 'caddy-data',
              'files': [
                {'src': 'caddy/pki/authorities/local/',                     'mode': '0700'},
                {'src': 'caddy/pki/authorities/local/root.crt.j2',          'mode': '0644'},
                {'src': 'caddy/pki/authorities/local/root.key.j2',          'mode': '0600'},
                {'src': 'caddy/pki/authorities/local/intermediate.crt.j2',  'mode': '0644'},
                {'src': 'caddy/pki/authorities/local/intermediate.key.j2',  'mode': '0600'}
              ]
            }
          ] if caddy_seed_internal_ca else []
        )
      }}
    podman_quadlet_firewall_port_forwards: >-
      {{ [{'port': 80, 'proto': 'tcp', 'toport': caddy_listen_port}]
         + ([{'port': 443, 'proto': 'tcp', 'toport': caddy_listen_port_https}]
            if caddy_domain else []) }}
    # Also open the HTTPS listen port directly (not only via 443→9443
    # forward) so containers on this host can reach Caddy on
    # <subdomain>.<caddy_domain>:{{ caddy_listen_port_https }} via the
    # host-gateway. Firewall port-forwards only apply to external traffic,
    # so pod-to-host traffic needs the port itself open.
    podman_quadlet_firewall_ports: >-
      {{ [caddy_listen_port_https ~ '/tcp'] if caddy_domain else [] }}

- name: Reload Caddy configuration # noqa: no-changed-when
  become: true
  ansible.builtin.shell: >
    su - webproxy -c 'podman exec caddy caddy reload --config /etc/caddy/Caddyfile 2>&1'
  changed_when: false
  failed_when: false

# --------------------------------------------------------------------------
# Export Caddy's internal root CA certificate to a host path so other
# containers (e.g. the Ente museum pod) can mount it and trust Caddy's
# self-signed certs when talking to other services through Caddy.
# --------------------------------------------------------------------------
- name: Ensure Caddy CA cert host directory exists
  become: true
  ansible.builtin.file:
    path: "{{ caddy_ca_cert_host_path | dirname }}"
    state: directory
    mode: "0755"
  when: caddy_domain | length > 0

- name: Wait for Caddy's internal root CA to be generated # noqa: no-changed-when
  become: true
  ansible.builtin.shell: >
    su - webproxy -c 'podman exec caddy
    test -f /data/caddy/pki/authorities/local/root.crt'
  register: caddy_ca_ready
  retries: 30
  delay: 2
  until: caddy_ca_ready.rc == 0
  changed_when: false
  when: caddy_domain | length > 0

- name: Export Caddy internal root CA to host # noqa: no-changed-when
  become: true
  ansible.builtin.shell: >
    set -o pipefail;
    su - webproxy -c 'podman exec caddy
    cat /data/caddy/pki/authorities/local/root.crt'
    > {{ caddy_ca_cert_host_path | quote }}
  args:
    executable: /bin/bash
  changed_when: false
  when: caddy_domain | length > 0

- name: Set permissions on exported Caddy CA cert
  become: true
  ansible.builtin.file:
    path: "{{ caddy_ca_cert_host_path }}"
    mode: "0644"
  when: caddy_domain | length > 0
