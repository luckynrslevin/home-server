---

- name: Ensure rootless user group exists
  ansible.builtin.group:
    name: wireguard
    gid: "{{ my_linux_users.wireguard.gid }}"
    state: present

- name: Ensure rootless user exists
  ansible.builtin.user:
    name: wireguard
    state: present
    uid: "{{ my_linux_users.wireguard.uid }}"
    group: wireguard
    create_home: true

- name: Enable linger for rootless user
  become: true
  ansible.builtin.command:
    cmd: "loginctl enable-linger wireguard"
  changed_when: false

- name: Enable podman auto-update timer for rootless user # noqa: no-changed-when yaml[line-length]
  become: true
  ansible.builtin.command:
    cmd: "sudo -u wireguard XDG_RUNTIME_DIR=/run/user/{{ my_linux_users.wireguard.uid }} DBUS_SESSION_BUS_ADDRESS=unix:path=/run/user/{{ my_linux_users.wireguard.uid }}/bus systemctl --user enable --now podman-auto-update.timer"
  changed_when: false

- name: Save current role path
  ansible.builtin.set_fact:
    wireguard_role_path: "{{ role_path }}"

- name: Deploy wireguard container using podman_quadlet
  ansible.builtin.include_role:
    name: luckynrslevin.podman_quadlet
  vars:
    podman_quadlet_app_name: "wireguard"
    podman_quadlet_rootless_user_name: wireguard
    podman_quadlet_files_templates_src_path: "{{ wireguard_role_path }}"
    podman_quadlet_file_names:
      - wireguard.container.j2
      - wireguard-config.volume
    podman_quadlet_volumes_files_to_stage:
      - name: wireguard-config
        files:
          - src: wg_confs/wg0.conf.j2
            mode: "0600"
    podman_quadlet_firewall_ports:
      - "{{ wireguard_srv_port }}/udp"
