---
# WireGuard server configuration.
# Real secrets (privkey, peer pubkeys) live in host_vars/<host>.yml via
# Ansible Vault. These defaults are only shape + safe fallbacks.

# Container image. LinuxServer's actively maintained build, pulled from
# their own registry (no Docker Hub rate limits). The kernel module is
# expected to already be loaded on the host — SYS_MODULE is NOT requested.
wireguard_image: "lscr.io/linuxserver/wireguard:latest"

# UDP port exposed on the host for incoming VPN connections.
wireguard_srv_port: 61000

# Tunnel address for the server end of the tunnel.
wireguard_srv_address: "10.10.10.1/32"

# Optional DNS pushed to clients via wg0.conf.
wireguard_srv_dns: ""

# List of peer definitions. Each entry: {name, public_key, allowed_ips}.
# Override in host_vars; keep pubkeys in vault.
wireguard_peers: []
