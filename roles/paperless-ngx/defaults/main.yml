---
# Container images
paperless_postgres_image: "public.ecr.aws/docker/library/postgres:16"
paperless_redis_image: "public.ecr.aws/docker/library/redis:7-alpine"
paperless_app_image: "ghcr.io/paperless-ngx/paperless-ngx:latest"
paperless_gotenberg_image: "docker.io/gotenberg/gotenberg:8"

# Paperless-ngx admin account created on first startup.
# After initial setup, change the password via the web UI.
paperless_admin_user: "admin"

# Timezone for document timestamps and scheduler.
paperless_time_zone: "Europe/Berlin"

# OCR language(s). Use ISO 639-2 3-letter codes, '+' separated.
# Common: deu (German), eng (English), fra (French).
paperless_ocr_language: "deu+eng"

# Enable Gotenberg for Office document conversion (docx, xlsx, pptx → PDF).
paperless_enable_gotenberg: true

# Consumer behaviour.
#
# consumer_recursive:        watch subdirectories of /usr/src/paperless/consume,
#                            not just the top level. Needed for use-cases that
#                            organise scans into subfolders (e.g. the SFTP
#                            sidecar with paperless_sftp_scan_subdirs).
# consumer_subdirs_as_tags:  auto-tag each ingested document with the names
#                            of the subdirectories it was dropped into. Works
#                            well combined with paperless_sftp_scan_subdirs =
#                            pick a folder in the scanner, get a tag.
# consumer_delete_duplicates: when a dropped file is an exact duplicate
#                            (MD5) of an existing doc, silently delete the
#                            incoming file instead of moving it to the
#                            error/duplicates area. Cleaner scan-reattempt
#                            workflow; skipped docs just vanish.
#
# All three default False (paperless's own defaults).
paperless_consumer_recursive: false
paperless_consumer_subdirs_as_tags: false
paperless_consumer_delete_duplicates: false

# SFTP sidecar (opt-in). When enabled, an atmoz/sftp container runs
# alongside the paperless pod under the same rootless user and mounts
# `paperless-consume.volume` as its SFTP drop target. A scanner (or any
# SFTP client) with an authorised public key can write PDFs directly
# into the volume paperless already watches — no intermediate move step.
# When disabled (default), nothing extra is deployed.
paperless_sftp_ingest_enabled: false

# Sidecar image. atmoz/sftp is small, widely used, key-auth-capable,
# chroots by default. See https://github.com/atmoz/sftp for docs.
paperless_sftp_image: "docker.io/atmoz/sftp:latest"

# Host TCP port the sidecar publishes. Deliberately *not* 22, to avoid
# any collision or confusion with the host's own sshd.
paperless_sftp_port: 2222

# List of SSH public keys (one per entry, full line in OpenSSH format)
# authorised to SFTP as the `paperless-scanner` user. Expected to be
# set from vaulted private inventory when the feature is enabled.
# Empty list + enabled flag = hard fail at deploy (see tasks/main.yml).
paperless_sftp_ingest_authorized_keys: []

# Backup manifest — consumed by the backup role and restore playbook.
backup_manifest:
  service_user: paperless
  service_unit: paperless-ngx-pod
  volumes:
    - { name: paperless-redis-data, method: tar }
    - { name: paperless-data, method: tar }
    - { name: paperless-export, method: tar }
    - { name: paperless-media, method: rsync, nas_share: paperless-media }
  databases:
    - { container: paperless-db, db_user: paperless, db_name: paperless, method: pgdump }
  post_restore_tasks: restore.yml
