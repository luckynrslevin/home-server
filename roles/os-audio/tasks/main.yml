# Ensure the system is up-to-date
# - name: INSTALL - Ensure system is up-to-date
#   become: true
#   ansible.builtin.dnf:
#     name: "*"
#     state: latest # noqa: package-latest
#     update_cache: true

# Install required base packages (e.g., alsa-utils)
- name: INSTALL - Install required base packages
  become: true
  ansible.builtin.dnf:
    name:
      - alsa-utils
    state: present

# Detect which ALSA card actually has a playback PCM. On some systems
# (especially VMs with virtio-snd), card 0 is capture-only and card 1 is
# playback. Without an override, ALSA-aware containers (shairport-sync)
# pick card 0 and fail with "output_device_error_2".
- name: Detect lowest ALSA card with a playback device
  ansible.builtin.shell: |
    set -o pipefail
    awk -F'[: -]+' '/playback/ {print $1+0; exit}' /proc/asound/pcm
  register: alsa_playback_card_result
  changed_when: false
  failed_when: false

- name: Set ALSA playback card fact
  ansible.builtin.set_fact:
    alsa_playback_card: "{{ alsa_playback_card_result.stdout | default('') | trim }}"

# Only write an override when the playback card is NOT the default (card 0).
# Hosts where card 0 already has playback get no /etc/asound.conf, leaving
# any user-managed config untouched.
- name: Override ALSA default card when playback is not on card 0
  become: true
  ansible.builtin.copy:
    dest: /etc/asound.conf
    content: |
      defaults.pcm.card {{ alsa_playback_card }}
      defaults.ctl.card {{ alsa_playback_card }}
    mode: "0644"
  when:
    - alsa_playback_card != ""
    - alsa_playback_card != "0"

# Re-stat after the optional write so callers (shairportsync) know whether
# to bind-mount the file into their container.
- name: Check whether /etc/asound.conf exists
  ansible.builtin.stat:
    path: /etc/asound.conf
  register: asound_conf_stat

# Ensure the line 'blacklist snd_hda_intel' is present in /etc/modprobe.d/blacklist.conf
- name: Ensure the line 'blacklist snd_hda_intel' is present in /etc/modprobe.d/blacklist.conf
  become: true
  ansible.builtin.lineinfile:
    path: /etc/modprobe.d/blacklist.conf
    line: "blacklist snd_hda_intel"
    create: true  # Create the file if it does not exist
    owner: root
    group: root
    mode: '0644'
  register: blacklist_result

# Reboot the system if the line was added (skip for local connections —
# rebooting the controller would kill the playbook).
- name: Reboot the system if the line was added
  become: true
  ansible.builtin.reboot:
    msg: "Rebooting to apply modprobe blacklist change"
    test_command: whoami
  when:
    - blacklist_result.changed  # noqa: no-handler
    - ansible_connection != "local"

- name: Notify about pending reboot for local connection
  ansible.builtin.debug:
    msg: "Kernel module blacklist changed — reboot this server manually to apply."
  when:
    - blacklist_result.changed
    - ansible_connection == "local"

# Wait for the system to be online after reboot
- name: Wait for the system to be online after reboot
  ansible.builtin.wait_for:
    host: "{{ ansible_host | default(inventory_hostname) }}"
    port: 22
    timeout: 600
    state: started
  when:
    - blacklist_result.changed  # noqa: no-handler
    - ansible_connection != "local"
