---

# TODO:
# Add automatic playlist generation https://github.com/NeptuneHub/AudioMuse-AI
# https://www.nexus0.net/pub/sw/lmsrecommender/
#

- name: Ensure rootless user group exists
  ansible.builtin.group:
    name: jukebox
    gid: "{{ my_linux_users.jukebox.gid }}"
    state: present

- name: Ensure rootless user exists
  ansible.builtin.user:
    name: jukebox
    state: present
    uid: "{{ my_linux_users.jukebox.uid }}"
    group: jukebox
    create_home: true

- name: Add jukebox user to audio group to get access to /dev/snd
  ansible.builtin.user:
    name: jukebox
    groups: audio
    append: true
# TODO: Seems a reboot is required here. Otherwise the snd device will not
#       be detected by the squeezelite container. However, after the first reboot
#       it is working properly.

- name: Enable linger for rootless user
  become: true
  ansible.builtin.command:
    cmd: "loginctl enable-linger jukebox"
  changed_when: false

- name: Enable podman auto-update timer for rootless user # noqa: no-changed-when
  become: true
  ansible.builtin.command:
    cmd: >
      sudo -u jukebox XDG_RUNTIME_DIR=/run/user/{{ my_linux_users.jukebox.uid }}
      DBUS_SESSION_BUS_ADDRESS=unix:path=/run/user/{{ my_linux_users.jukebox.uid }}/bus
      systemctl --user enable --now podman-auto-update.timer
  changed_when: false

- name: Save current role path
  ansible.builtin.set_fact:
    jukebox_role_path: "{{ role_path }}"

# Deploy lyrion music server and squeezelite player in rootless mode
# TODO: Use squeezelite integrated to lyrion music server container
- name: Deploy jukebox container using podman_quadlet
  ansible.builtin.include_role:
    name: luckynrslevin.podman_quadlet
  vars:
    podman_quadlet_app_name: "jukebox-pod"
    podman_quadlet_rootless_user_name: jukebox
    podman_quadlet_files_templates_src_path: "{{ jukebox_role_path }}"
    podman_quadlet_file_names:
      - jukebox-server.container
      - jukebox-server-config.volume
      - jukebox-server-playlist.volume
      - jukebox-server-music.volume
      - jukebox-player.container
      - jukebox.pod
      - jukebox.network
    podman_quadlet_volumes_files_to_stage:
      - name: jukebox-server-config
        files:
          - src: prefs/
            state: directory
            mode: "0700"
          - src: prefs/favorites.opml
            mode: "0600"
    podman_quadlet_volumes_config_patches:
      - name: jukebox-server-config
        patches:
          - file: prefs/server.prefs
            format: yaml
            set:
              securitySecret: "{{ jukebox_security_secret }}"
              language: DE
              skin: material
              protectSettings: 1
              playlistdir: /playlist
              wizardDone: 1
    podman_quadlet_firewall_ports:
      - "9100/tcp" # For access to  web interface
      # - "9090/tcp" # only required for external clients (e.g. smart phone)
      # - "3483/tcp" # player and server communicate over
      # - "3483/udp" # pod related network

# Install Material Skin plugin if not already present.
# Must be done from inside the container to preserve correct SELinux labels
# on the volume files. Installing from the host causes SELinux context
# mismatches that break container startup.
- name: Check if Material Skin plugin is installed # noqa: no-changed-when
  become: true
  ansible.builtin.shell: >
    su - jukebox -c 'podman exec jukebox-server test -f /config/cache/Plugins/MaterialSkin/install.xml'
  register: jukebox_material_skin_check
  failed_when: false
  changed_when: false

- name: Get latest Material Skin release URL # noqa: command-instead-of-module risky-shell-pipe
  become: true
  ansible.builtin.shell: >
    set -o pipefail &&
    curl -fsSL https://api.github.com/repos/CDrummond/lms-material/releases/latest
    | grep browser_download_url | grep '\.zip"' | head -1 | cut -d'"' -f4
  register: jukebox_material_skin_url
  when: jukebox_material_skin_check.rc != 0
  changed_when: false

- name: Install Material Skin plugin into config volume # noqa: no-changed-when
  become: true
  ansible.builtin.shell: |
    PLUGIN_DIR=$(su - jukebox -c 'podman volume inspect jukebox-server-config --format={% raw %}{{.Mountpoint}}{% endraw %}')/cache/Plugins/MaterialSkin
    mkdir -p "$PLUGIN_DIR"
    cd "$PLUGIN_DIR"
    curl -fsSL -o material.zip "{{ jukebox_material_skin_url.stdout }}"
    unzip -q -o material.zip
    rm material.zip
    chown -R {{ my_linux_users.jukebox.uid }}:{{ my_linux_users.jukebox.gid }} "$PLUGIN_DIR"
    restorecon -R "$PLUGIN_DIR" 2>/dev/null || true
  when: jukebox_material_skin_check.rc != 0

- name: Restart jukebox to load Material Skin plugin # noqa: no-changed-when
  become: true
  ansible.builtin.shell: >
    sudo -u jukebox XDG_RUNTIME_DIR=/run/user/{{ my_linux_users.jukebox.uid }}
    DBUS_SESSION_BUS_ADDRESS=unix:path=/run/user/{{ my_linux_users.jukebox.uid }}/bus
    systemctl --user restart jukebox-pod
  when: jukebox_material_skin_check.rc != 0
