---
# Post-install configuration for Jukebox (Lyrion Music Server)
# - Patches prefs/server.prefs once LMS has created it.
# - Installs the Material Skin plugin if not already present.
# Can be re-run independently to update without redeploying the container.

# ---------------------------------------------------------------------------
# Patch server.prefs after LMS creates it.
#
# We cannot use the Galaxy role's podman_quadlet_volumes_config_patches
# mechanism here: that runs synchronously right after the container is
# started, but LMS writes prefs/server.prefs lazily on first startup (a
# few seconds later). The patcher then fails with rc=1 ("File does not
# exist"). See https://github.com/luckynrslevin/home-server/issues/1.
# ---------------------------------------------------------------------------

- name: Get jukebox-server-config volume mountpoint # noqa: no-changed-when
  become: true
  ansible.builtin.shell: >
    su - jukebox -c
    'podman volume inspect jukebox-server-config --format={% raw %}{{.Mountpoint}}{% endraw %}'
  register: jukebox_config_mount
  changed_when: false

- name: Wait for LMS to create prefs/server.prefs
  become: true
  ansible.builtin.wait_for:
    path: "{{ jukebox_config_mount.stdout }}/prefs/server.prefs"
    state: present
    timeout: 120
    sleep: 2

- name: Patch prefs/server.prefs # noqa: no-changed-when
  become: true
  ansible.builtin.script:
    cmd: >-
      {{ role_path }}/../luckynrslevin.podman_quadlet/files/patch_structured_config.py
      --file "{{ jukebox_config_mount.stdout }}/prefs/server.prefs"
      --format yaml
      --key "{{ item.key }}"
      --value "{{ item.value }}"
    executable: python3
  loop:
    - { key: securitySecret, value: "{{ jukebox_security_secret }}" }
    - { key: language,       value: DE }
    - { key: skin,           value: material }
    - { key: protectSettings, value: 1 }
    - { key: playlistdir,    value: /playlist }
    - { key: wizardDone,     value: 1 }
  loop_control:
    label: "{{ item.key }}"
  no_log: true
  changed_when: false


# Install Material Skin plugin if not already present.
# Must be done from inside the container to preserve correct SELinux labels
# on the volume files. Installing from the host causes SELinux context
# mismatches that break container startup.
- name: Check if Material Skin plugin is installed # noqa: no-changed-when
  become: true
  ansible.builtin.shell: >
    su - jukebox -c 'podman exec jukebox-server test -f /config/cache/Plugins/MaterialSkin/install.xml'
  register: jukebox_material_skin_check
  failed_when: false
  changed_when: false

- name: Get latest Material Skin release URL # noqa: command-instead-of-module risky-shell-pipe
  become: true
  ansible.builtin.shell: >
    set -o pipefail &&
    curl -fsSL https://api.github.com/repos/CDrummond/lms-material/releases/latest
    | grep browser_download_url | grep '\.zip"' | head -1 | cut -d'"' -f4
  register: jukebox_material_skin_url
  when: jukebox_material_skin_check.rc != 0
  changed_when: false

- name: Install Material Skin plugin into config volume # noqa: no-changed-when
  become: true
  ansible.builtin.shell: |
    PLUGIN_DIR=$(su - jukebox -c 'podman volume inspect jukebox-server-config --format={% raw %}{{.Mountpoint}}{% endraw %}')/cache/Plugins/MaterialSkin
    mkdir -p "$PLUGIN_DIR"
    cd "$PLUGIN_DIR"
    curl -fsSL -o material.zip "{{ jukebox_material_skin_url.stdout }}"
    unzip -q -o material.zip
    rm material.zip
    chown -R {{ my_linux_users.jukebox.uid }}:{{ my_linux_users.jukebox.gid }} "$PLUGIN_DIR"
    restorecon -R "$PLUGIN_DIR" 2>/dev/null || true
  when: jukebox_material_skin_check.rc != 0

- name: Restart jukebox to load Material Skin plugin # noqa: no-changed-when
  become: true
  ansible.builtin.shell: >
    sudo -u jukebox XDG_RUNTIME_DIR=/run/user/{{ my_linux_users.jukebox.uid }}
    DBUS_SESSION_BUS_ADDRESS=unix:path=/run/user/{{ my_linux_users.jukebox.uid }}/bus
    systemctl --user restart jukebox-pod
  when: jukebox_material_skin_check.rc != 0
