---
# Container images
entephoto_postgres_image: "public.ecr.aws/docker/library/postgres:15"
entephoto_minio_image: "quay.io/minio/minio:latest"
entephoto_server_image: "ghcr.io/ente-io/server:latest"
entephoto_web_image: "ghcr.io/ente-io/web:latest"

# URLs served to the browser. Override in host_vars when using a reverse proxy.
entephoto_api_url: "http://{{ ansible_facts['default_ipv4']['address'] }}:8080"
entephoto_photos_url: "http://{{ ansible_facts['default_ipv4']['address'] }}:3000"
entephoto_albums_url: "http://{{ ansible_facts['default_ipv4']['address'] }}:3002"

# MinIO S3 endpoint used for presigned upload URLs sent to browsers.
# Override when proxying MinIO through a reverse proxy.
entephoto_s3_endpoint: "{{ ansible_facts['default_ipv4']['address'] }}:3200"

# When museum must reach MinIO via an HTTPS reverse proxy on the same host
# (so presigned URLs work over HTTPS in the browser without mixed-content
# errors), set these two variables. Leaving them empty keeps the direct-to-
# MinIO behaviour.
#
#   entephoto_s3_host: hostname portion of entephoto_s3_endpoint — mapped
#                      to host-gateway inside the pod so museum can resolve
#                      it without the host's DNS server.
#   entephoto_caddy_ca_cert_path: host path to the Caddy internal root CA
#                      (see caddy_ca_cert_host_path). Mounted read-only and
#                      pointed to via SSL_CERT_FILE so museum's Go runtime
#                      trusts Caddy's self-signed TLS.
entephoto_s3_host: ""
entephoto_caddy_ca_cert_path: ""

# Museum signs presigned URLs as http:// when are_local_buckets is true and
# https:// when false. It must match the scheme of entephoto_s3_endpoint:
# HTTP when museum talks directly to MinIO, HTTPS when proxying via Caddy.
entephoto_s3_local_buckets: true

# MinIO admin username (password comes from vault: entephoto_minio_password)
entephoto_minio_root_user: enteadmin

# Admin user IDs (set after first signup, found via:
#   podman exec entephoto-postgres psql -U pguser ente_db -c "SELECT user_id FROM users;")
# Admins can manage subscriptions and storage for all users.
entephoto_admin_user_ids: []

# Backup manifest — consumed by the backup role and restore playbook.
backup_manifest:
  service_user: entephoto
  service_unit: entephoto-pod
  volumes:
    - { name: entephoto-museum-config, method: tar }
    - { name: entephoto-minio-data, method: rsync, nas_share: photos }
  databases:
    - { container: entephoto-postgres, db_user: pguser, db_name: ente_db, method: pgdump }
  post_restore_tasks: restore.yml
