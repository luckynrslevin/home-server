---
# Post-install configuration for Pi-hole
# Manages adlists and gravity database updates.
# Can be re-run independently to update adlists without redeploying the container.

# Configure Pi-hole adlists (v6 uses /etc/pihole/adlists.list, not SQLite)
- name: Add adlists to Pi-hole # noqa: no-changed-when
  become: true
  ansible.builtin.shell: |
    su - pihole -c 'podman exec pihole sh -c "
      {% for adlist in pihole_adlists %}
      grep -qxF \"{{ adlist.address }}\" /etc/pihole/adlists.list 2>/dev/null || echo \"{{ adlist.address }}\" >> /etc/pihole/adlists.list
      {% endfor %}
    "'
  register: pihole_adlists_result

- name: Fix listsCache permissions for rootless container
  become: true
  ansible.builtin.shell: >
    su - pihole -c 'podman unshare rm -rf
    $(podman volume inspect systemd-pihole-etc --format={% raw %}{{.Mountpoint}}{% endraw %})/listsCache'
  changed_when: false
  failed_when: false

- name: Update Pi-hole gravity # noqa: command-instead-of-shell
  become: true
  ansible.builtin.shell: su - pihole -c 'podman exec pihole pihole -g'
  changed_when: false

# Local DNS records: write the full list via pihole-FTL --config dns.hosts.
# This is the canonical v6 way; /etc/pihole/hosts/custom.list is generated
# from pihole.toml and would be clobbered if edited directly.
# argv form passes the JSON literal as one argument to podman exec, with no
# shell-level quoting at all. chdir avoids the "cannot chdir to /home/ds"
# error that sudo -u causes when the calling user's CWD isn't readable by
# the target user.
- name: Configure Pi-hole local DNS records # noqa: no-changed-when
  become: true
  ansible.builtin.command:
    chdir: /tmp
    argv:
      - sudo
      - -u
      - pihole
      - --
      - podman
      - exec
      - pihole
      - pihole-FTL
      - --config
      - dns.hosts
      - "{{ pihole_local_dns_records | map(attribute='ip') | zip(pihole_local_dns_records | map(attribute='hostname')) | map('join', ' ') | list | to_json }}"
  when: pihole_local_dns_records | length > 0
  changed_when: false
