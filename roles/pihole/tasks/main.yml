---

- name: Ensure rootless user group exists
  ansible.builtin.group:
    name: pihole
    gid: "{{ my_linux_users.pihole.gid }}"
    state: present

- name: Ensure rootless user exists
  ansible.builtin.user:
    name: pihole
    state: present
    uid: "{{ my_linux_users.pihole.uid }}"
    group: pihole
    create_home: true

- name: Enable linger for rootless user
  become: true
  ansible.builtin.command:
    cmd: "loginctl enable-linger pihole"
  changed_when: false

- name: Enable podman auto-update timer for rootless user # noqa: no-changed-when yaml[line-length]
  become: true
  ansible.builtin.command:
    cmd: "sudo -u pihole XDG_RUNTIME_DIR=/run/user/{{ my_linux_users.pihole.uid }} DBUS_SESSION_BUS_ADDRESS=unix:path=/run/user/{{ my_linux_users.pihole.uid }}/bus systemctl --user enable --now podman-auto-update.timer"
  changed_when: false

- name: Save current role path
  ansible.builtin.set_fact:
    pihole_role_path: "{{ role_path }}"

# Image pre-pulling for the containers discovered in this role's quadlet
# files is handled by the luckynrslevin.podman_quadlet role, which runs
# the pull before stopping the old container — so the old Pi-hole instance
# keeps serving DNS while the new images are fetched. From v1.2.0 onward
# the Galaxy role also handles --policy=newer and the Docker Hub rate-limit
# fallback (warn + reuse cached image when the pull fails but the image is
# already locally available). No hand-rolled pre-pull is needed here.

# Deploy the Unbound config file to the pihole user's home.
# Bind-mounted into the container as a read-only drop-in.
- name: Deploy Unbound configuration
  become: true
  ansible.builtin.template:
    src: "{{ pihole_role_path }}/templates/volumes/unbound-config/unbound.conf.j2"
    dest: /home/pihole/unbound-pihole.conf
    owner: "{{ my_linux_users.pihole.uid }}"
    group: "{{ my_linux_users.pihole.gid }}"
    mode: "0644"
  when: pihole_enable_unbound | bool


- name: Deploy pihole container using podman_quadlet
  ansible.builtin.include_role:
    name: luckynrslevin.podman_quadlet
  vars:
    podman_quadlet_app_name: "pihole"
    podman_quadlet_rootless_user_name: pihole
    podman_quadlet_files_templates_src_path: "{{ pihole_role_path }}"
    podman_quadlet_file_names: >-
      {{ ['pihole.container.j2', 'pihole-etc.volume', 'pihole-dnsmasq.volume']
         + (['unbound.container.j2'] if pihole_enable_unbound | bool else []) }}
    podman_quadlet_firewall_ports:
      - "{{ pihole_web_port_https }}/tcp"
    podman_quadlet_firewall_port_forwards:
      - port: 53
        proto: tcp
        toport: 1053
      - port: 53
        proto: udp
        toport: 1053

# Start and enable Unbound (it's a separate systemd unit, not part of
# the pihole app unit, so the Galaxy role's restart doesn't cover it).
- name: Enable and start Unbound # noqa: no-changed-when
  become: true
  ansible.builtin.command:
    cmd: >
      sudo -u pihole XDG_RUNTIME_DIR=/run/user/{{ my_linux_users.pihole.uid }}
      DBUS_SESSION_BUS_ADDRESS=unix:path=/run/user/{{ my_linux_users.pihole.uid }}/bus
      systemctl --user start unbound
  changed_when: false
  when: pihole_enable_unbound | bool

# Configure the host itself to use Pi-hole for DNS via systemd-resolved
# The firewall port forward (53→1053) only applies to external traffic,
# so the host needs to point directly at 127.0.0.1:1053
- name: Create systemd-resolved drop-in directory
  become: true
  ansible.builtin.file:
    path: /etc/systemd/resolved.conf.d
    state: directory
    mode: "0755"

# Remove the bootstrap drop-in that points at Quad9. systemd-resolved merges
# all drop-ins additively — leaving this one behind adds 9.9.9.9 alongside
# our 127.0.0.1:1053, and resolved freely round-robins between them, which
# silently bypasses Pi-hole's blocking for whichever queries land on Quad9.
- name: Remove bootstrap DNS drop-in (superseded by pihole.conf)
  become: true
  ansible.builtin.file:
    path: /etc/systemd/resolved.conf.d/temp-dns.conf
    state: absent
  register: pihole_resolved_bootstrap_removed

- name: Configure systemd-resolved to use Pi-hole
  become: true
  ansible.builtin.copy:
    dest: /etc/systemd/resolved.conf.d/pihole.conf
    content: |
      [Resolve]
      DNS=127.0.0.1:1053
      DNSStubListener=yes
    mode: "0644"
  register: pihole_resolved_config

- name: Restart systemd-resolved # noqa: no-handler
  become: true
  ansible.builtin.systemd_service:
    name: systemd-resolved
    state: restarted
  when: pihole_resolved_config.changed or pihole_resolved_bootstrap_removed.changed

# Even after restart, clients that previously queried a given name may see
# stale answers until their own DNS caches expire. Flushing resolved's
# cache here ensures the host immediately starts getting fresh answers
# through Pi-hole rather than replaying cached pre-install results.
- name: Flush systemd-resolved DNS caches # noqa: no-changed-when
  become: true
  ansible.builtin.command: resolvectl flush-caches
  changed_when: false
  when: pihole_resolved_config.changed or pihole_resolved_bootstrap_removed.changed

- name: Run post-install configuration
  ansible.builtin.import_tasks: postinstall.yml

- name: Run post-install verification
  ansible.builtin.import_tasks: verify.yml
  when: pihole_run_verification | bool
  tags:
    - verify

- name: Register backup manifest
  ansible.builtin.set_fact:
    _backup_manifests: >-
      {{ _backup_manifests | default([]) +
         [backup_manifest | combine({'_role_name': role_name})] }}
  when: backup_manifest is defined
