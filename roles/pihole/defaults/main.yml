pihole_web_port_https: 8443

# Pi-hole container image. Defaults to the official GHCR mirror to avoid
# Docker Hub anonymous pull rate limits.
pihole_image: "ghcr.io/pi-hole/pihole:latest"

# Upstream DNS servers (semicolon-separated)
# Examples: Quad9, Cloudflare, Google
pihole_dns_upstreams: "9.9.9.9;149.112.112.112"

# DNS used by the Pi-hole container itself (not for clients)
pihole_container_dns: "9.9.9.9"

# Local domain name
pihole_domain_name: "lan"

# Pi-hole container hostname
pihole_hostname: "pihole.lan"

# Local network settings for conditional DNS forwarding
pihole_local_network: "192.168.x.0/24"
pihole_local_router: "192.168.x.1"

# Extra adlists inserted into gravity.db in addition to Pi-hole's own
# built-in default (StevenBlack unified hosts — auto-added by the
# container on first run). Override per host in inventory.
pihole_adlists:
  - address: "https://cdn.jsdelivr.net/gh/hagezi/dns-blocklists@latest/domains/pro.txt"
    comment: "Hagezi Multi Pro — ads, trackers, malware, phishing (~300K domains)"
  - address: "https://raw.githubusercontent.com/Turtlecute33/Toolz/master/src/d3host.txt"
    comment: "https://adblock.turtlecute.org/"

# Local DNS records (custom A records served by Pi-hole to LAN clients).
# Stored in pihole.toml under dns.hosts via `pihole-FTL --config`.
# Format: list of {ip, hostname} dicts. Override per-host in inventory.
pihole_local_dns_records: []

# Unbound recursive DNS resolver. When enabled, an Unbound container
# runs alongside Pi-hole and replaces external DNS upstreams (Quad9,
# Cloudflare, etc.) with local recursive resolution from the DNS root
# servers. Full privacy — no third-party resolver sees your queries.
pihole_enable_unbound: true

# Unbound listen port (inside the container, reachable from Pi-hole
# on localhost). Convention: 5335 to avoid conflict with Pi-hole on 53.
pihole_unbound_port: 5335

# Backup manifest — consumed by the backup role and restore playbook.
backup_manifest:
  service_user: pihole
  service_unit: pihole
  volumes:
    - { name: systemd-pihole-etc, method: tar }
    - { name: systemd-pihole-dnsmasq, method: tar }
  post_restore_tasks: restore.yml
