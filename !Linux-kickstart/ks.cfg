# Fedora Server Kickstart — Example Configuration
#
# Copy and adapt this file to your hardware. Key things to change:
# - Network device name (enp1s0, eno1, eth0, etc.)
# - Hostname
# - Disk device (nvme0n1, sda, etc.) and partition sizes
# - Username and SSH public key
# - Timezone

# Keyboard layouts
keyboard --vckeymap=us --xlayouts='us'
# System language
lang en_US.UTF-8

# Network information
network  --bootproto=dhcp --device=enp1s0 --ipv6=auto --activate
network  --hostname=homeserver

%packages
@^custom-environment
@headless-management
dnf-automatic
podman
quota
htop
usbutils
nfs-utils
-cockpit
%end

# System authorization information
authselect enable-feature with-fingerprint

# Run the Setup Agent on first boot
firstboot --enable

# Disk partitioning — adapt device name and sizes to your hardware
ignoredisk --only-use=nvme0n1
# WARNING: This will erase ALL data on the target disk!
clearpart --drives=nvme0n1 --all

# Partition layout (adjust sizes in MB to your disk)
part pv.2392 --fstype="lvmpv" --ondisk=nvme0n1 --size=962563
part /boot/efi --fstype="efi" --ondisk=nvme0n1 --size=600 --fsoptions="umask=0077,shortname=winnt"
part /boot --fstype="ext4" --ondisk=nvme0n1 --size=2048
volgroup LVM-fedora_server --pesize=4096 pv.2392
logvol /var --fstype="xfs" --size=40960 --name=var --vgname=LVM-fedora_server
logvol /var/lib/containers --fstype="xfs" --size=256000 --name=var_lib_containers --vgname=LVM-fedora_server
logvol /home --fstype="xfs" --size=614400 --name=home --vgname=LVM-fedora_server
logvol / --fstype="xfs" --size=35840 --name=root --vgname=LVM-fedora_server
logvol /var/log --fstype="xfs" --size=15360 --name=var_log --vgname=LVM-fedora_server

timesource --ntp-server=_gateway
# System timezone
timezone Europe/Berlin --utc

# Root password locked — access via sudo only
rootpw --lock
user --groups=wheel --name=myuser --lock --gecos="myuser"

# Add your SSH public key for passwordless login
sshkey --username=myuser "ssh-ed25519 AAAA... user@host"


# Post installation tasks
%post --log=/root/ks-dnf-automatic.log

# Configure automatic updates
cat >/etc/dnf/automatic.conf <<'EOF'
[commands]
upgrade_type = default
random_sleep = 0
download_updates = yes
apply_updates = yes
reboot = when-needed

[emitters]
emit_via = motd

[base]
enabled = true

[timer]
random_sleep = 0
on_calendar = daily
persistent = true
EOF

# Enable the systemd timer so automatic updates run
systemctl enable dnf-automatic.timer

# Enable sudo nopasswd for your user
echo "myuser ALL=(ALL) NOPASSWD: ALL" > /etc/sudoers.d/myuser-nopasswd
chmod 440 /etc/sudoers.d/myuser-nopasswd

%end

# Reboot the system
reboot
